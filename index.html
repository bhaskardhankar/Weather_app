<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wheather App</title>
    <link rel="stylesheet" href="style.css">    
</head>
<body>
    <div class="card">
        <div class="search">
            <input type="text" placeholder="Enter city Name" spellcheck="false">
            <button>Search!</button>
        </div>

        <div class="wheather">
            <img src="images/rain.png" class="wheather_icon">
            <h1 class="temp">22°C</h1>
            <h2 class="city">New York</h2>
            <div class="details">
                <div class="col">
                    <img src="images/humidity.png">
                    <div>
                        <p class="humidity">50%</p>
                        <p>Humidity</p>
                    </div>
                </div>
                <div class="col">
                    <img src="images/wind.png">
                    <div>
                        <p class="wind">15 km/h</p>
                        <p>Wind Speed</p>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>

    const apiKey = "6c0aca4078d8ea04b6d65f65ac36f1b8";
    const apiUrl = "https://api.openweathermap.org/data/2.5/weather?&units=metric&q=";

    const searchBox = document.querySelector(".search input")
    const searchBtn = document.querySelector(".search button")
    const wheatherIcon = document.querySelector(".wheather_icon")

    async function checkWheather(city){
        const response = await fetch(apiUrl + city + `&appid=${apiKey}`);
        var data = await response.json();


        document.querySelector(".city").innerHTML = data.name;
        document.querySelector(".temp").innerHTML = Math.round(data.main.temp) + "°c";
        document.querySelector(".humidity").innerHTML = data.main.humidity + "%";
        document.querySelector(".wind").innerHTML = data.wind.speed + "km/h";

        if (data.weather[0].main.toLowerCase() == "clouds") {
            wheatherIcon.src = "images/clouds.png";
        } else if (data.weather[0].main.toLowerCase() == "clear") {
            wheatherIcon.src = "images/clear.png";
        } else if (data.weather[0].main.toLowerCase() == "drizzle") { 
            wheatherIcon.src = "images/drizzle.png";
        } else if (data.weather[0].main.toLowerCase() == "mist") {
            wheatherIcon.src = "images/mist.png";
        } else if (data.weather[0].main.toLowerCase() == "snow") {
            wheatherIcon.src = "images/snow.png";
        }

        document.querySelector(".wheather").style.display = "block";

    }
    searchBox.addEventListener("keypress", (e) => {
    if (e.key === "Enter") checkWheather(searchBox.value);
    });
    
    searchBtn.addEventListener("click", ()=>{
        checkWheather(searchBox.value);
    }) 

    </script>


</body>
</html>
